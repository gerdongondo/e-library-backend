# ========== SERVER ==========
server.port=8081


# ========== DATABASE ==========
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/reactlibrarydatabase?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root

spring.datasource.password=hhhhhhhh

# ========== JPA ==========
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ========== SPRING DATA REST ==========
spring.data.rest.base-path=/api


# ========== FILE UPLOAD ==========
file.upload-dir=uploads/books
# Sous-dossier pour les PDF (crťť automatiquement)
file.upload.pdf-dir=${file.upload-dir}/pdfs

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ========== LOGGING ==========
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.luv2code.springbootlibrary=TRACE

# ========== JWT CONFIGURATION ==========
jwt.secret=MaSuperCleSecretePourLeMaster2BibliothequeEnLigne2025TrŤsLonguePourSecurite
# JWT expiration en millisecondes (24 heures = 24 * 60 * 60 * 1000)
jwt.expiration=86400000
jwt.issuer=spring-boot-library
jwt.token-prefix=Bearer
jwt.header=Authorization

# ========== Log ==========
logging.level.com.luv2code.springbootlibrary.config.JwtAuthenticationFilter=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG


# ========== PASSWORD RESET ==========
# Token expiration en minutes (15 minutes)
password.reset.token.expiration=15
# Longueur du token sťcurisť
password.reset.token.length=32

# ========== BORROW CONFIGURATION ==========
# Durťe d'emprunt en jours
borrow.duration.days=14
# Nombre maximum d'emprunts simultanťs par utilisateur
borrow.max.concurrent=5
# Pťnalitť par jour de retard (en euros)
borrow.penalty.per.day=0.50

# ========== AUDIT LOG CONFIGURATION ==========
audit.log.retention.days=180
# Vous pouvez ajouter un commentaire sur une ligne sťparťe
# 180 jours = 6 mois

audit.log.enabled=true

# Logging level pour l'audit
logging.level.com.luv2code.springbootlibrary.service.AuditLogServiceImpl=INFO
logging.level.com.luv2code.springbootlibrary.controller.AdminAuditController=INFO

# Format des logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n.  corrige sans casser le code existant
